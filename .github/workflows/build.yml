name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build
        run: cargo tauri build

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outDir = "portable/site2pdf-$version-portable"
          New-Item -ItemType Directory -Path "$outDir/resources/chromium" -Force
          Copy-Item "src-tauri/target/release/site2pdf.exe" "$outDir/"
          Copy-Item "src-tauri/resources/chromium/chrome-win64" "$outDir/resources/chromium/" -Recurse
          Compress-Archive -Path "$outDir" -DestinationPath "site2pdf-$version-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            site2pdf-*-portable.zip
          generate_release_notes: true
